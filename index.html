<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FF Token Extractor — RIZER</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }
    .card {
      background: #12121c;
      border: 1px solid #ff6200;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 0 30px rgba(255,98,0,0.15);
    }
    h1 {
      color: #ff6200;
      font-size: 1.6rem;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 28px; }
    label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 6px; }
    textarea {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.88rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border 0.2s;
    }
    textarea:focus { border-color: #ff6200; }
    .row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    button {
      flex: 1;
      min-width: 140px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    #btnRun   { background: #ff6200; color: #fff; }
    #btnStop  { background: #333; color: #ccc; }
    #btnCopy  { background: #1a1a2e; color: #ff6200; border: 1px solid #ff6200; }

    /* Timer bar */
    .timer-wrap {
      margin-top: 20px;
      background: #1a1a2e;
      border-radius: 8px;
      overflow: hidden;
      height: 6px;
    }
    #timerBar {
      height: 100%;
      background: #ff6200;
      width: 100%;
      transition: width 1s linear;
    }
    .timer-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #888;
      margin-top: 6px;
    }
    #timerText { color: #ff6200; }
    #statusDot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 6px;
      transition: background 0.3s;
    }
    #statusDot.active { background: #00e676; box-shadow: 0 0 6px #00e676; }
    #statusDot.loading { background: #ff6200; animation: pulse 0.8s infinite alternate; }
    @keyframes pulse { from { opacity: 1 } to { opacity: 0.3 } }

    /* Result box */
    #resultBox {
      margin-top: 24px;
      background: #0d0d1a;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px;
      display: none;
    }
    #resultBox.show { display: block; }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .badge {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge.success { background: #00e67622; color: #00e676; border: 1px solid #00e676; }
    .badge.fail    { background: #ff000022; color: #ff4444; border: 1px solid #ff4444; }
    .info-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.83rem; flex-wrap: wrap; }
    .info-label { color: #888; min-width: 110px; }
    .info-val   { color: #e0e0e0; word-break: break-all; }
    .jwt-wrap {
      margin-top: 12px;
      background: #12121c;
      border-radius: 6px;
      padding: 10px;
      font-size: 0.75rem;
      color: #aaa;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #2a2a3a;
    }
    .log-wrap {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #555;
      max-height: 100px;
      overflow-y: auto;
    }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
    .log-entry span { color: #888; margin-right: 8px; }
  </style>
</head>
<body>

<div class="card">
  <h1>🔥 FF Token Extractor</h1>
  <p class="subtitle">MADE BY RIZER — Auto-refresh every 30 minutes</p>

  <label for="tokenInput">Access Token</label>
  <textarea id="tokenInput" placeholder="Yahan apna Garena/Free Fire Access Token paste karein..."></textarea>

  <div class="row">
    <button id="btnRun"  onclick="startSession()">▶ Run Now</button>
    <button id="btnStop" onclick="stopSession()">⏹ Stop Auto</button>
    <button id="btnCopy" onclick="copyJWT()">📋 Copy JWT</button>
  </div>

  <div class="timer-wrap" style="margin-top:20px;">
    <div id="timerBar"></div>
  </div>
  <div class="timer-info">
    <span><span id="statusDot"></span><span id="statusText">Idle</span></span>
    <span id="timerText">—</span>
  </div>

  <div id="resultBox">
    <div class="result-header">
      <strong style="color:#ccc;">Last Result</strong>
      <span id="badge" class="badge"></span>
    </div>
    <div class="info-row"><span class="info-label">Account UID</span><span class="info-val" id="rUid">—</span></div>
    <div class="info-row"><span class="info-label">Region</span><span class="info-val" id="rRegion">—</span></div>
    <div class="info-row"><span class="info-label">Platform</span><span class="info-val" id="rPlatform">—</span></div>
    <div class="info-row"><span class="info-label">Timestamp</span><span class="info-val" id="rTimestamp">—</span></div>
    <div class="info-row"><span class="info-label">JWT Token</span></div>
    <div class="jwt-wrap" id="rJwt">—</div>
  </div>

  <div class="log-wrap" id="logBox"></div>
</div>

<script>
  const INTERVAL_MS = 30 * 60 * 1000; // 30 minutes
  let autoTimer    = null;
  let countdownInt = null;
  let nextRunAt    = null;
  let lastJWT      = '';

  function log(msg) {
    const d = document.getElementById('logBox');
    const now = new Date().toLocaleTimeString();
    d.innerHTML = `<div class="log-entry"><span>[${now}]</span>${msg}</div>` + d.innerHTML;
  }

  function setStatus(state) {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className = '';
    if (state === 'active')  { dot.classList.add('active');  text.textContent = 'Auto-running'; }
    else if (state === 'loading') { dot.classList.add('loading'); text.textContent = 'Fetching...'; }
    else { text.textContent = 'Idle'; }
  }

  function updateCountdown() {
    if (!nextRunAt) return;
    const diff = Math.max(0, Math.floor((nextRunAt - Date.now()) / 1000));
    const m = Math.floor(diff / 60).toString().padStart(2, '0');
    const s = (diff % 60).toString().padStart(2, '0');
    document.getElementById('timerText').textContent = `Next run in ${m}:${s}`;
    const pct = Math.max(0, ((nextRunAt - Date.now()) / INTERVAL_MS) * 100);
    document.getElementById('timerBar').style.width = pct + '%';
    if (diff === 0) clearInterval(countdownInt);
  }

  async function fetchToken() {
    const token = document.getElementById('tokenInput').value.trim();
    if (!token) { log('⚠️ Access token empty hai — skip'); return; }

    setStatus('loading');
    log('🔄 Token fetch kar raha hai...');
    try {
      const res  = await fetch(`/api/rizer?access_token=${encodeURIComponent(token)}`);
      const data = await res.json();
      showResult(data);
    } catch (e) {
      log('❌ Error: ' + e.message);
      setStatus('active');
    }
  }

  function showResult(data) {
    const box = document.getElementById('resultBox');
    box.classList.add('show');
    const badge = document.getElementById('badge');

    if (data.success) {
      badge.textContent = '✅ SUCCESS';
      badge.className   = 'badge success';
      document.getElementById('rUid').textContent       = data.account_uid || '—';
      document.getElementById('rRegion').textContent    = data.region || '—';
      document.getElementById('rPlatform').textContent  = 'Type ' + (data.platform_type_used || '—');
      document.getElementById('rTimestamp').textContent = data.timestamp
        ? new Date(data.timestamp * 1000).toLocaleString() : '—';
      document.getElementById('rJwt').textContent       = data.jwt || '—';
      lastJWT = data.jwt || '';
      log('✅ JWT mila — UID: ' + data.account_uid + ' | Region: ' + data.region);
    } else {
      badge.textContent = '❌ FAILED';
      badge.className   = 'badge fail';
      log('❌ ' + (data.error || 'Unknown error'));
    }
    setStatus('active');
  }

  function startSession() {
    const token = document.getElementById('tokenInput').value.trim();
    if (!token) { alert('Pehle Access Token daalo!'); return; }

    stopSession();
    fetchToken();

    autoTimer = setInterval(() => {
      nextRunAt = Date.now() + INTERVAL_MS;
      fetchToken();
      clearInterval(countdownInt);
      countdownInt = setInterval(updateCountdown, 1000);
    }, INTERVAL_MS);

    nextRunAt = Date.now() + INTERVAL_MS;
    clearInterval(countdownInt);
    countdownInt = setInterval(updateCountdown, 1000);
    setStatus('active');
    log('🚀 Auto-mode start — har 30 min pe chalega');
  }

  function stopSession() {
    clearInterval(autoTimer);
    clearInterval(countdownInt);
    autoTimer = null; nextRunAt = null;
    document.getElementById('timerBar').style.width = '100%';
    document.getElementById('timerText').textContent = '—';
    setStatus('idle');
    log('⏹ Auto-mode band kiya');
  }

  function copyJWT() {
    if (!lastJWT) { alert('Pehle token fetch karo!'); return; }
    navigator.clipboard.writeText(lastJWT).then(() => alert('JWT copy ho gaya! ✅'));
  }
</script>
</body>
</html>
